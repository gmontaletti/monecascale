url: https://gmontaletti.github.io/monecascale/

template:
  bootstrap: 5
  bslib:
    primary: "#0054AD"
    base_font: {google: "Roboto"}

development:
  mode: auto

home:
  links:
  - text: Companion package (moneca)
    href: https://github.com/gmontaletti/MONECA
  - text: Scaling roadmap
    href: https://github.com/gmontaletti/MONECA/blob/master/reference/moneca/SCALING_ROADMAP.md

reference:
  - title: "Scalable Clustering Backends"
    desc: "Alternative backends producing moneca-class output"
    contents:
      - moneca_sbm
      - moneca_sbm_install_graphtool
  - title: "Flow Clustering"
    desc: >
      Infomap / Map Equation on mobility counts. Flat Infomap via
      igraph, with a recursive wrapper that synthesises a 2-3 level
      hierarchy. Output is a plain moneca-class object with a
      $flow_diagnostics slot.
    contents:
      - moneca_flow
  - title: "Bipartite Segmentation"
    desc: >
      Rectangular input (person x employer, worker x occupation).
      Returns two linked moneca-class objects - one row-view, one col-view -
      each consumable by moneca's segment.*() and plot_moneca_*() stack.
    contents:
      - moneca_bipartite
      - format.moneca_bipartite
      - print.moneca_bipartite
      - summary.moneca_bipartite
      - print.summary.moneca_bipartite
  - title: "Auto-level Selection"
    desc: >
      Post-hoc selection of a hierarchy level from a moneca_sbm or
      moneca_bipartite fit via MDL elbow or level-to-level MI plateau.
      Composes with the segment.levels = "auto" wrapper on both backends.
    contents:
      - auto_segment_levels
      - print.auto_segment_levels
      - format.auto_segment_levels

articles:
  - title: "Getting Started"
    desc: "Introduction to monecascale"
    navbar: ~
    contents:
      - monecascale-sbm
  - title: "Bipartite Segmentation"
    desc: "Rectangular mobility, RR = DcLbm residual, hierarchical co-clustering."
    contents:
      - monecascale-bipartite
  - title: "Flow Clustering"
    desc: "Map Equation / Infomap for mobility communities, flat and recursive."
    contents:
      - monecascale-flow
  - title: "Auto Level Selection"
    desc: "MDL + MI plateau criteria for picking the right level post-hoc."
    contents:
      - monecascale-auto-level
